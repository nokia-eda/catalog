              destinations:
                description: List of NATS cluster destination where metrics must be
                  exported.
                items:
                  properties:
                    name:
                      description: Cluster Publisher name.
                      type: string
                    subject:
                      description: NATS or Jetstream subject.
                      type: string
                    subjectFromJsPath:
                      description: If true, the subject name is based on the received
