                      type: string
                  required:
                  - name
                  type: object
                type: array
              enabled:
                default: true
                description: Specifies if the Export rules are enabled or not.
                type: boolean
              exports:
                description: Define data sources to be exported to a NATS cluster.
                properties:
                  alarms:
                    description: Defines Alarms as export source
                    properties:
                      exclude:
                        description: List of Alarm types to exclude.
                        items:
                          type: string
                        type: array
                      include:
                        description: List of Alarm types to include. Set it to '*'
                          for all.
                        items:
                          type: string
                        type: array
                      namespaces:
                        description: List of namespaces to export alarms from.
                        items:
                          type: string
                        type: array
                    type: object
                  query:
                    description: Defines a custom query as export source
                    items:
                      properties:
                        fields:
                          description: |-
                            Fields to export from the EDB table set in `spec.query.path`.
                            Exports all fields if not specified.
                          items:
                            type: string
                          type: array
                        includeTimestamps:
                          description: Include the export timestamp in the published
                            message.
                          type: boolean
                        mode:
                          default: on-change
                          description: Export mode.
