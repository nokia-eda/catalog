                          - on-change
                          - periodic
                          - both
                          type: string
                        path:
                          description: |-
                            The EDB path to export, in the format '.node.srl.interface'.
                            Should NOT include the namespace element.
                          type: string
                        period:
                          description: Export period in seconds. Applicable if mode
                            is set to 'periodic' or 'both'.
                          format: int64
                          type: integer
                        where:
                          description: A where clause to use for the query, e.g. 'oper-state
                            = down'. You can omit enclosing parentheses.
                          type: string
                      type: object
                    type: array
                type: object
            required:
            - destinations
            - exports
            type: object
