apiVersion: core.eda.nokia.com/v1
kind: Manifest
metadata:
  name: gitlab
spec:
  group: gitlab.eda.nokia.com
  version: v1alpha1
  title: Gitlab
  description: Creates Gitlab pipelines and issues.
  image: ghcr.io/nokia-eda/apps/gitlab:v2.0.0
  author: Nokia
  gitPathPrefix: /
  supportedCoreVersions:
    - "v5.0"
  appInfo:
    readme: README.md
    documentation: DOCUMENTATION.md
    license: LICENSE
    screenshots:
      - gl/assets/gitlab-logo.png
    categories:
      - "integrations"
    ociSpecVersion: v1.0.0
  components:
    - crd:
        path: gl/config/crd/bases/gitlab.eda.nokia.com_gitlabinstances.yaml
        schema: gl/docs/openapiv3/eda_oas_gitlab.eda.nokia.com_gitlabinstances.json
        namespaced: true
        api:
          expose: readWrite
        ui:
          category: Gitlab
          name: Instance
        kubernetes:
          exportPolicy: all
          importPolicy: all
        names:
          listKind: GitlabInstanceList
          plural: gitlabinstances
          singular: gitlabinstance
          kind: GitlabInstance
    - crd:
        path: gl/config/crd/bases/gitlab.eda.nokia.com_clustergitlabinstances.yaml
        schema: gl/docs/openapiv3/eda_oas_gitlab.eda.nokia.com_clustergitlabinstances.json
        namespaced: true
        api:
          expose: readWrite
        ui:
          category: Gitlab
          name: Cluster Instance
        kubernetes:
          exportPolicy: all
          importPolicy: all
        names:
          plural: clustergitlabinstances
          singular: clustergitlabinstance
          kind: ClusterGitlabInstance
          listKind: ClusterGitlabInstanceList
    - crd:
        path: gl/config/crd/bases/gitlab.eda.nokia.com_gitlabpipelines.yaml
        schema: gl/docs/openapiv3/eda_oas_gitlab.eda.nokia.com_gitlabpipelines.json
        namespaced: true
        api:
          expose: readWrite
        ui:
          category: Gitlab
          name: Pipeline
        kubernetes:
          exportPolicy: all
          importPolicy: all
        names:
          plural: gitlabpipelines
          singular: gitlabpipeline
          kind: GitlabPipeline
          listKind: GitlabPipelineList
    - crd:
        path: gl/config/crd/bases/gitlab.eda.nokia.com_clustergitlabpipelines.yaml
        schema: gl/docs/openapiv3/eda_oas_gitlab.eda.nokia.com_clustergitlabpipelines.json
        namespaced: true
        api:
          expose: readWrite
        ui:
          category: Gitlab
          name: Cluster Pipeline
        kubernetes:
          exportPolicy: all
          importPolicy: all
        names:
          kind: ClusterGitlabPipeline
          listKind: ClusterGitlabPipelineList
          plural: clustergitlabpipelines
          singular: clustergitlabpipeline
    - crd:
        path: gl/config/crd/bases/gitlab.eda.nokia.com_gitlabissues.yaml
        schema: gl/docs/openapiv3/eda_oas_gitlab.eda.nokia.com_gitlabissues.json
        namespaced: true
        api:
          expose: readWrite
        ui:
          category: Gitlab
          name: Issue
        kubernetes:
          exportPolicy: all
          importPolicy: all
        names:
          plural: gitlabissues
          singular: gitlabissue
          kind: GitlabIssue
          listKind: GitlabIssueList
    - crd:
        path: gl/config/crd/bases/gitlab.eda.nokia.com_clustergitlabissues.yaml
        schema: gl/docs/openapiv3/eda_oas_gitlab.eda.nokia.com_clustergitlabissues.json
        namespaced: true
        api:
          expose: readWrite
        ui:
          category: Gitlab
          name: Cluster Issue
        kubernetes:
          exportPolicy: all
          importPolicy: all
        names:
          plural: clustergitlabissues
          singular: clustergitlabissue
          kind: ClusterGitlabIssue
          listKind: ClusterGitlabIssueList
    - crd:
        path: gl/config/crd/bases/gitlab.eda.nokia.com_creategitlabissues.yaml
        schema: gl/docs/openapiv3/eda_oas_gitlab.eda.nokia.com_creategitlabissues.json
        namespaced: true
        workflow: true
        api:
          expose: readWrite
        ui:
          name: Create Gitlab Issue
        names:
          kind: CreateGitlabIssue
          listKind: CreateGitlabIssueList
          plural: creategitlabissues
          singular: creategitlabissue
    - crd:
        path: gl/config/crd/bases/gitlab.eda.nokia.com_rungitlabpipelines.yaml
        schema: gl/docs/openapiv3/eda_oas_gitlab.eda.nokia.com_rungitlabpipelines.json
        namespaced: true
        workflow: true
        api:
          expose: readWrite
        ui:
          name: Run Gitlab Pipeline
        names:
          plural: rungitlabpipelines
          singular: rungitlabpipeline
          kind: RunGitlabPipeline
          listKind: RunGitlabPipelineList
    - cr:
        path: gl/manifests/webhooks.yaml
    - cr:
        path: gl/manifests/deployment.yaml
    - cr:
        path: workflows/v1alpha1/CreateGitlabIssue/flowdefinition.yaml
    - cr:
        path: workflows/v1alpha1/RunGitlabPipeline/flowdefinition.yaml
  dependencies:
    - container:
        name: gitlab-controller
        image: image/gitlab-controller
